# Run a local Postgres for development:
#   docker compose up -d db        (start)
#   docker compose down            (stop, keep data)
#   docker compose down -v         (stop + delete data)
#
# DATABASE_URL=postgresql://postgres:postgres@localhost:5432/basedb?schema=public
services:
  db:
    image: postgres:16-alpine
    container_name: nextjs-base-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: basedb
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d basedb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
